<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animal Selection & Detection</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style3.css">

<style>
body {
  font-family: 'Poppins', sans-serif;
}

.animal-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.animal-card {
  background: #fff;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.animal-card img {
  width: 100px;
  height: 100px;
  object-fit: contain;
}

.btn {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.primary-btn {
  background: #4CAF50;
  color: white;
}

.note-card {
  margin-top: 30px;
  background: #fff3cd;
  padding: 15px;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="dashboard-layout">

<!-- Sidebar -->
<aside class="sidebar">
<h2 class="logo">LHMS</h2>

<nav class="nav-menu">
<a href="dashboard.html" class="nav-link">Dashboard</a>
<a href="#" class="nav-link active">Animal Selection & Detection</a>
<a href="health-indicators.html" class="nav-link">Health Indicators</a>
<a href="reports-history.html" class="nav-link">Reports History</a>
<a href="vet-connect.html" class="nav-link">Vet Connect</a>
</nav>
</aside>

<!-- Main Content -->
<main class="dashboard-content">

<header class="dashboard-header">
<h1>Select an Animal</h1>
<span class="user-name">Choose animal to start AI analysis</span>
</header>

<!-- Animal Selection -->
<section class="animal-grid">

<div class="animal-card">
<img src="images/cow.png" alt="Cow">
<h3>Cow</h3>
<button class="btn primary-btn animal-btn" data-animal="cow">Select</button>
</div>

<div class="animal-card">
<img src="images/goat.png" alt="Goat">
<h3>Goat</h3>
<button class="btn primary-btn animal-btn" data-animal="goat">Select</button>
</div>

<div class="animal-card">
<img src="images/camel.png" alt="Camel">
<h3>Camel</h3>
<button class="btn primary-btn animal-btn" data-animal="camel">Select</button>
</div>

<div class="animal-card">
<img src="images/chicken.png" alt="Chicken">
<h3>Chicken</h3>
<button class="btn primary-btn animal-btn" data-animal="chicken">Select</button>
</div>

</section>

<!-- Note -->
<div class="note-card">
<p>
<strong>Note:</strong> This is a preliminary analysis. Please consult a certified veterinarian for an accurate diagnosis.
</p>
</div>

</main>
</div>

<!-- JavaScript -->
<script>

// Handle animal selection
document.querySelectorAll(".animal-btn").forEach(btn => {

  btn.addEventListener("click", () => {

    const selectedAnimal = btn.dataset.animal;

    // Store selected animal for next page
    localStorage.setItem("selectedAnimal", selectedAnimal);

    // Redirect to Health Indicators page
    window.location.href = "health-indicators.html";

  });

});

</script>

</body>
</html>
