<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Health Indicators</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style4.css">

  <style>
    /* small additions (optional but useful) */
    #result {
      margin-top: 20px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 10px;
      font-family: Poppins;
    }

    .controls {
      margin: 20px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #2d6cdf;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    select, input {
      padding: 8px;
    }
  </style>
</head>

<body>

<div class="dashboard-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">LHMS</h2>

    <nav class="nav-menu">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="animal-selection-and-detection.html" class="nav-link">Animal Selection</a>
      <a href="health-indicators.html" class="nav-link active">Health Indicators</a>
      <a href="reports-history.html" class="nav-link">Reports History</a>
      <a href="vet-connect.html" class="nav-link">Vet Connect</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="dashboard-content">

    <header class="dashboard-header">
      <h1>Health Indicators</h1>
      <span class="user-name">Detailed health metrics</span>
    </header>

    <!-- IMAGE BOX -->
    <div class="image-box">
      <span>DISEASE IMAGE</span>
    </div>

    <!-- CONTROLS (NEW) -->
    <div class="controls">

      <select id="animalSelect">
        <option value="cow">Cow</option>
        <option value="goat">Goat</option>
        <option value="camel">Camel</option>
        <option value="chicken">Chicken</option>
      </select>

      <input type="file" id="imageInput" />

      <button onclick="predictDisease()">Predict</button>

    </div>

    <!-- RESULT BOX (NEW) -->
    <div id="result"></div>

      <!-- Disclaimer Checkbox -->
<div class="disclaimer-container">
  <label class="disclaimer-label">
    <input type="checkbox" id="aiDisclaimer">
    I understand this is preliminary AI Tool and not a professional diagnosis
  </label>
</div>

  </main>

</div>

<!-- ================= JS LOGIC ================= -->
<script>
async function predictDisease() {

    const imageInput = document.getElementById("imageInput");
    const animal = document.getElementById("animalSelect").value;

    if (!imageInput.files[0]) {
        alert("Please upload an image first");
        return;
    }

    const formData = new FormData();
    formData.append("image", imageInput.files[0]);
    formData.append("animal", animal);

    const response = await fetch("/predict", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    // show result
    document.getElementById("result").innerHTML = `
        <h3> Disease: ${data.disease}</h3>
        <p> Confidence: ${data.confidence}</p>
        <p> Treatment: ${data.treatment}</p>
    `;
}

// IMAGE PREVIEW
document.getElementById("imageInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event) {
        document.querySelector(".image-box").innerHTML =
            `<img src="${event.target.result}" style="width:100%; height:100%; object-fit:cover; border-radius:10px;">`;
    };

    reader.readAsDataURL(file);
});
</script>

</body>
</html>
