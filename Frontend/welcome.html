<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style1.css">
</head>
<body>

  <section class="welcome-screen">

    <div class="welcome-container">

      <div class="welcome-text">
        <h1>Livestock Health Monitoring System</h1>
        <p>
          AI-powered disease detection and health monitoring for cows,
          goats, camels, and chickens.
        </p>

        <!-- Login Form -->
        <div class="welcome-buttons">
          <form action="dashboard.html">
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>

            <div class="form-buttons">
              <button type="submit" class="btn primary-btn">Get Started</button>
              <a href="signin.html" class="btn secondary-btn">Sign In</a>
            </div>
          </form>
        </div>

      </div>

    </div>
  </section>

</body>
</html>
